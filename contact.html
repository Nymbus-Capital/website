    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Nymbus Capital</a>

            <ul class="nav-menu">

            </ul>
        </div>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <div class="contact-content">
            <div class="contact-info">
                <h2>Get in Touch</h2>
                <p>Email: <a href="mailto:info@nymbus.com">info@nymbus.com</a></p>
                <p>Phone: +1 (212) 555-0100</p>
                <p>Address: 123 Financial Avenue, New York, NY 10001</p>
            </div>
            <div class="contact-form">
                <h2>Send us a Message</h2>
                <form>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-button">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nymbus Capital. All rights reserved.</p>
    </footer>
